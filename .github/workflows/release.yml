name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  checks:
    uses: ./.github/workflows/checks-reusable.yml
    secrets: inherit

  publish-testpypi:
    name: publish-testpypi
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
